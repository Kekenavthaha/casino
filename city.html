<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🦀 Нью-Крабск - Жильё и прописка</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: radial-gradient(circle at 20% 30%, #1a2a0e, #0a0f05);
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #f3e9c0;
      padding: 16px 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }

    .city-container {
      max-width: 520px;
      width: 100%;
      margin: 0 auto;
      background: rgba(10, 20, 8, 0.8);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(212, 175, 55, 0.6);
      border-radius: 48px;
      padding: 20px 16px 24px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.8), 0 0 0 2px #2e3b1f inset;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #1a2a0e;
      border-radius: 60px;
      padding: 8px 16px;
      margin-bottom: 20px;
      border: 1px solid #d4af37;
      box-shadow: 0 6px 0 #0a0f05;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo span {
      font-size: 28px;
    }

    .logo h2 {
      font-weight: 800;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #f9e076, #fff3c9);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .balance {
      background: #0f1a0a;
      padding: 6px 18px;
      border-radius: 40px;
      border: 1px solid #ffd966;
      box-shadow: inset 0 2px 5px #000;
    }

    .balance .label {
      font-size: 11px;
      opacity: 0.7;
    }

    .balance .value {
      font-size: 22px;
      font-weight: bold;
      color: #ffdf7e;
    }

    .tabs {
      display: flex;
      gap: 8px;
      background: #1f3018;
      padding: 6px;
      border-radius: 60px;
      margin-bottom: 20px;
      border: 1px solid #4a613b;
    }

    .tab {
      flex: 1;
      background: transparent;
      border: none;
      padding: 12px 0;
      border-radius: 40px;
      font-size: 16px;
      font-weight: bold;
      color: #b9b07b;
      cursor: pointer;
      transition: 0.2s;
    }

    .tab.active {
      background: linear-gradient(145deg, #f3ce5e, #d4af37);
      color: #1a2a0e;
      box-shadow: 0 4px 0 #7a5c1a, 0 6px 12px black;
    }

    .panel {
      background: #0e1a0a;
      border-radius: 32px;
      padding: 20px;
      border: 1px solid #b49450;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
    }

    .hidden {
      display: none !important;
    }

    svg {
      width: 100%;
      height: auto;
      cursor: pointer;
    }

    .district {
      fill: #2e3b1f;
      stroke: #d4af37;
      stroke-width: 2;
      transition: fill 0.2s;
    }

    .district:hover {
      fill: #4b613b;
    }

    .district-label {
      font-size: 12px;
      fill: #f3e9c0;
      font-weight: bold;
      text-anchor: middle;
      pointer-events: none;
    }

    .housing-list {
      margin-top: 16px;
    }

    .card {
      background: #1f2e14;
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 12px;
      border: 1px solid #b49450;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .card .info {
      flex: 1;
    }

    .card .price {
      font-weight: bold;
      color: #ffdf7e;
    }

    .card .actions {
      display: flex;
      gap: 8px;
    }

    .btn {
      background: linear-gradient(145deg, #f5d654, #d4af37);
      border: none;
      padding: 10px 16px;
      border-radius: 30px;
      font-weight: bold;
      color: #142005;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 4px 0 #7a5c1a;
      transition: 0.1s;
    }

    .btn:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #7a5c1a;
    }

    .back-btn {
      background: #3a4a2a;
      color: #f3e9c0;
      box-shadow: 0 4px 0 #1a260e;
      margin-top: 12px;
      width: 100%;
    }
  </style>
</head>
<body>
<div class="city-container">
  <div class="header">
    <div class="logo">
      <span>🦀</span>
      <h2>НЬЮ-КРАБСК</h2>
    </div>
    <div class="balance">
      <div class="label">БАЛАНС</div>
      <div class="value" id="balanceValue">0</div>
    </div>
  </div>

  <!-- Вкладки -->
  <div class="tabs">
    <button class="tab active" data-tab="map">🗺️ Карта</button>
    <button class="tab" data-tab="my-housing">🏠 Моё жильё</button>
    <button class="tab" data-tab="services">📋 Крабуслуги</button>
  </div>

  <!-- Панель карты -->
  <div id="mapPanel" class="panel">
    <svg viewBox="0 0 500 400" id="cityMap">
      <!-- Молоттен (центр-север) -->
      <polygon class="district" data-district="1" points="180,30 320,30 350,120 250,160 150,120" />
      <text class="district-label" x="250" y="95">Молоттен</text>

      <!-- Круклин (юго-запад) -->
      <polygon class="district" data-district="2" points="50,140 150,120 180,220 100,300 30,250" />
      <text class="district-label" x="100" y="200">Круклин</text>

      <!-- Квинс-Краберс (северо-восток) -->
      <polygon class="district" data-district="3" points="320,30 460,60 420,180 350,120" />
      <text class="district-label" x="390" y="100">Квинс-Краберс</text>

      <!-- Бронкс-Клешнево (северо-запад) -->
      <polygon class="district" data-district="4" points="50,30 180,30 150,120 50,140" />
      <text class="district-label" x="110" y="85">Бронкс-Клешнево</text>

      <!-- Стейтен-Краб (южный остров) -->
      <polygon class="district" data-district="5" points="250,280 350,260 400,380 300,400 180,380" />
      <text class="district-label" x="300" y="330">Стейтен-Краб</text>

      <!-- Харлем-Краберс (восток) -->
      <polygon class="district" data-district="6" points="350,120 420,180 400,350 350,260" />
      <text class="district-label" x="385" y="240">Харлем-Краберс</text>
    </svg>

    <div id="districtInfo" class="housing-list">
      <p style="text-align:center; opacity:0.8;">Нажмите на район, чтобы посмотреть жильё</p>
    </div>
  </div>

  <!-- Панель Моё жильё -->
  <div id="myHousingPanel" class="panel hidden">
    <p>Здесь будет список вашего жилья и статус прописки.</p>
  </div>

  <!-- Панель Крабуслуг -->
  <div id="servicesPanel" class="panel hidden">
    <p>Здесь будут госуслуги: прописка, налоги, справки.</p>
  </div>
</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
  (function(){
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // ----- Вкладки -----
    const tabs = document.querySelectorAll('.tab');
    const panels = {
      map: document.getElementById('mapPanel'),
      'my-housing': document.getElementById('myHousingPanel'),
      services: document.getElementById('servicesPanel')
    };

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        const tabId = tab.dataset.tab;
        Object.values(panels).forEach(p => p.classList.add('hidden'));
        panels[tabId].classList.remove('hidden');
      });
    });

    // ----- Карта: клик по району -----
    const districtInfo = document.getElementById('districtInfo');
    const districts = document.querySelectorAll('.district');

    districts.forEach(poly => {
      poly.addEventListener('click', async () => {
        const districtId = parseInt(poly.dataset.district);
        await loadDistrictHousing(districtId);
      });
    });

    // Заглушка загрузки жилья (позже заменим на API)
    async function loadDistrictHousing(districtId) {
      const districtNames = {
        1: 'Молоттен',
        2: 'Краблин',
        3: 'Квинс-Краберс',
        4: 'Крабронкс',
        5: 'Стейтен-Краб',
        6: 'Харлем-Краберс'
      };

      // В будущем здесь будет запрос к /api/city/housing?district_id=X
      // Пока просто покажем заглушку с примерными данными
      const sampleHousing = [
        { id: 1, type: 'Студия', price: 3000000, rent: 700 },
        { id: 2, type: '2-комнатная', price: 5200000, rent: 1800 },
        { id: 3, type: 'Пентхаус', price: 16000000, rent: 8500 }
      ];

      let html = `<h4 style="margin-bottom:12px;">🏘️ ${districtNames[districtId]}</h4>`;
      sampleHousing.forEach(h => {
        html += `
          <div class="card">
            <div class="info">
              <div>${h.type}</div>
              <div class="price">Покупка: ${h.price.toLocaleString()} кр. | Аренда: ${h.rent} кр./день</div>
            </div>
            <div class="actions">
              <button class="btn" onclick="alert('Покупка пока не реализована')">Купить</button>
              <button class="btn" onclick="alert('Аренда пока не реализована')">Аренда</button>
            </div>
          </div>
        `;
      });
      districtInfo.innerHTML = html;
    }

    // Заглушка баланса (позже подтянем из API)
    document.getElementById('balanceValue').innerText = '...';

    // Инициализация (пока без запроса)
    tg.onEvent('viewportChanged', tg.expand);
  })();
</script>
</body>
</html>
